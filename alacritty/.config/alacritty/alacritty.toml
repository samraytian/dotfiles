# Alacritty configuration file format
# https://alacritty.org/config-alacritty.html

# General configurations
[general]
live_config_reload = true
import = [
    # Font
    # "~/.config/alacritty/fonts/jetbrains-mono.toml",
    "~/.config/alacritty/fonts/github-monospace.toml",
    # Color Themes
    "~/.config/alacritty/themes/gruvbox-dark.toml"
    # "~/.config/alacritty/themes/gruvbox-light.toml"
    # "~/.config/alacritty/themes/tokyo-night.toml"
    # "~/.config/alacritty/themes/tokyo-night-storm.toml"
]

[terminal]
shell = "zsh"

[font]
size = 13.0

[window]
# position = { x = 0, y = 0 }
decorations = "transparent"
dimensions = { columns = 140, lines = 50 }
padding = { x = 12, y = 12 }
# opacity = 0.96
# blur = true
