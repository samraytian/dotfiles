# Alacritty configuration file format
# https://alacritty.org/config-alacritty.html

# General configurations
live_config_reload = true

import = [
    # Color Themes
    "~/.config/alacritty/themes/gruvbox-dark.toml"
    # "~/.config/alacritty/themes/gruvbox-light.toml"
    # "~/.config/alacritty/themes/tokyo-night.toml"
    # "~/.config/alacritty/themes/tokyo-night-storm.toml"
]

[shell]
program = "zsh"

# Environment variables to set when running the command.
[env]
TERM = "xterm-256color"

[window]
decorations = "Transparent"
dimensions = { columns = 145, lines = 45 }
padding = { x = 12, y = 12 }
# opacity = 0.90
# blur = true

[cursor]
style = "Beam"

[font]
size = 13.0
normal = { family = "MonaspiceNe Nerd Font Mono", style = "Regular" }
bold = { family = "MonaspiceNe Nerd Font Mono", style = "Bold" }
italic = { family = "MonaspiceNe Nerd Font Mono", style = "Italic" }
bold_italic = { family = "MonaspiceNe Nerd Font Mono", style = "Bold Italic" }
