# Font configuration
font:
  normal:
    family: CartographCF Nerd Font Mono
    style: Regular

  bold:
    family: CartographCF Nerd Font Mono
    style: Bold

  italic:
    family: CartographCF Nerd Font Mono
    style: Regular Italic

  bold_italic:
    family: CartographCF Nerd Font Mono
    style: Bold Italic

  size: 13.0

  offset:
   x: 0
   y: -3

  glyph_offset:
   x: 0
   y: 0

  use_thin_strokes: true
  builtin_box_drawing: true

# If `true`, bold text is drawn using the bright color variants.
#draw_bold_text_with_bright_colors: false